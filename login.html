<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Motivos de Atraso</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="fonts/fa/all.min.css">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="Multitone Logo">
    </div>
    <h2>Acesso ao Sistema</h2>
    <p>Gestão de Motivos de Atraso do Paciente</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Usuário</label>
        <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="off">
      </div>
      
      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="off">
      </div>

      <button type="submit" class="btn btn-primary" id="btnLogin">
        <i class="fas fa-sign-in-alt" style="margin-right:6px"></i> Entrar
      </button>
    </form>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    async function handleLogin(event) {
      event.preventDefault();
      
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      const btnLogin = document.getElementById('btnLogin');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      
      if (!username || !password) return;
      
      btnLogin.disabled = true;
      btnLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
      
      try {
        const response = await fetch('api/login.jsp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.error || 'Erro ao realizar login.');
        }
        
        showToast(result.message || 'Login realizado com sucesso!', 'success');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        showToast(error.message, 'error');
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:6px"></i> Entrar';
      }
    }
    
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
      toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <span>${message}</span>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
      }, 3000);
    }
  </script>
</body>
</html>
